<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <style>
    {{STYLES}}
  </style>
</head>
<body>
  <!-- HEADER (will repeat on every page) -->
  <div class="pdf-header">
    <div class="logo">ImportarDeChina.com</div>
    <div class="product-title">{{PRODUCT_NAME}}</div>
  </div>

  <!-- MAIN CONTENT -->
  <main class="pdf-content">
    {{CONTENT}}
  </main>

  <!-- FOOTER (will repeat on every page) -->
  <div class="pdf-footer">
    <div class="author">Jorge Mora</div>
    <div class="website">ImportarDeChina.com</div>
  </div>
</body>
</html>
